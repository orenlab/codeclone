default_install_hook_types: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-toml
      - id: check-yaml
      - id: check-json
      - id: check-ast
      - id: debug-statements
      - id: check-case-conflict
      - id: check-symlinks
      - id: destroyed-symlinks
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: forbid-submodules

  - repo: local
    hooks:
      - id: ruff-format
        name: Ruff (format)
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-check
        name: Ruff (lint)
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: mypy
        name: Mypy
        entry: uv run mypy
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: codeclone
        name: CodeClone
        entry: uv run codeclone
        language: system
        pass_filenames: false
        args: [".", "--ci"]
        always_run: true
        stages: [pre-commit]

      - id: pytest
        name: Pytest
        entry: uv run pytest -q --cov=codeclone --cov-report=term-missing --cov-fail-under=98
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: lint-admonitions
        name: Lint admonitions
        entry: uv run scripts/lint_admonitions.py docs/ --fix
        language: system
        pass_filenames: false
        files: ^docs/.*\.md$
        stages: [ pre-commit ]
