<svg xmlns="http://www.w3.org/2000/svg" width="760" viewBox="0 0 760 720" role="img">
    <title>CodeClone analysis pipeline</title>
    <desc>Deterministic structural analysis pipeline with canonical report, baseline-aware gating, and multi-surface
        outputs
    </desc>

    <style>
        .box-gray { fill: #F1EFE8; stroke: #888780; }
        .box-purple { fill: #EEEDFE; stroke: #534AB7; }
        .box-teal { fill: #E1F5EE; stroke: #0F6E56; }
        .box-amber { fill: #FAEEDA; stroke: #854F0B; }

        .t-gray { fill: #444441; }
        .t-purple { fill: #3C3489; }
        .t-teal { fill: #085041; }
        .t-amber { fill: #633806; }

        .note { fill: #6B6A65; }
        .arr { stroke: #888780; stroke-width: 1.5; fill: none; }

        .lbl { font: 500 14px/1 'JetBrains Mono', monospace; }
        .sub { font: 400 12px/1 'JetBrains Mono', monospace; }

        @media (prefers-color-scheme: dark) {
        .box-gray { fill: #444441; stroke: #B4B2A9; }
        .box-purple { fill: #3C3489; stroke: #AFA9EC; }
        .box-teal { fill: #085041; stroke: #5DCAA5; }
        .box-amber { fill: #633806; stroke: #EF9F27; }

        .t-gray { fill: #D3D1C7; }
        .t-purple { fill: #CECBF6; }
        .t-teal { fill: #9FE1CB; }
        .t-amber { fill: #FAC775; }

        .note { fill: #C8C6BC; }
        .arr { stroke: #B4B2A9; }
        }
    </style>

    <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5"/>
        </marker>
    </defs>

    <!-- LEGEND -->
    <rect x="520" y="40" width="12" height="12" rx="2" class="box-gray"/>
    <text x="540" y="50" class="sub note">Input / control</text>

    <rect x="520" y="62" width="12" height="12" rx="2" class="box-purple"/>
    <text x="540" y="72" class="sub note">Detection pipeline</text>

    <rect x="520" y="84" width="12" height="12" rx="2" class="box-teal"/>
    <text x="540" y="94" class="sub note">Analysis / canonical data</text>

    <rect x="520" y="106" width="12" height="12" rx="2" class="box-amber"/>
    <text x="540" y="116" class="sub note">CI / governance</text>

    <!-- PIPELINE -->

    <!-- Python source -->
    <rect x="60" y="40" width="200" height="44" rx="8" class="box-gray"/>
    <text x="160" y="62" text-anchor="middle" class="lbl t-gray">Python source</text>

    <line x1="160" y1="84" x2="160" y2="100" class="arr" marker-end="url(#arr)"/>

    <!-- Parse -->
    <rect x="60" y="102" width="200" height="44" rx="8" class="box-purple"/>
    <text x="160" y="124" text-anchor="middle" class="lbl t-purple">Parse</text>
    <text x="280" y="124" class="sub note">AST per file</text>

    <line x1="160" y1="146" x2="160" y2="162" class="arr" marker-end="url(#arr)"/>

    <!-- Normalize -->
    <rect x="60" y="164" width="200" height="44" rx="8" class="box-purple"/>
    <text x="160" y="186" text-anchor="middle" class="lbl t-purple">Normalize</text>
    <text x="280" y="186" class="sub note">canonical form · rename-safe</text>

    <line x1="160" y1="208" x2="160" y2="224" class="arr" marker-end="url(#arr)"/>

    <!-- CFG -->
    <rect x="60" y="226" width="200" height="44" rx="8" class="box-purple"/>
    <text x="160" y="248" text-anchor="middle" class="lbl t-purple">CFG</text>
    <text x="280" y="248" class="sub note">control-flow graph</text>

    <line x1="160" y1="270" x2="160" y2="286" class="arr" marker-end="url(#arr)"/>

    <!-- Fingerprint -->
    <rect x="60" y="288" width="200" height="44" rx="8" class="box-purple"/>
    <text x="160" y="310" text-anchor="middle" class="lbl t-purple">Fingerprint</text>
    <text x="280" y="310" class="sub note">stable hash (fn / block / segment)</text>

    <line x1="160" y1="332" x2="160" y2="348" class="arr" marker-end="url(#arr)"/>

    <!-- Group -->
    <rect x="60" y="350" width="200" height="44" rx="8" class="box-purple"/>
    <text x="160" y="372" text-anchor="middle" class="lbl t-purple">Group</text>
    <text x="280" y="372" class="sub note">clone groups · structural findings</text>

    <line x1="160" y1="394" x2="160" y2="410" class="arr" marker-end="url(#arr)"/>

    <!-- Metrics -->
    <rect x="60" y="412" width="200" height="44" rx="8" class="box-teal"/>
    <text x="160" y="434" text-anchor="middle" class="lbl t-teal">Metrics</text>
    <text x="280" y="434" class="sub note">complexity · coupling · cohesion · dead code</text>

    <line x1="160" y1="456" x2="160" y2="472" class="arr" marker-end="url(#arr)"/>

    <!-- Canonical Report -->
    <rect x="60" y="474" width="200" height="44" rx="8" class="box-teal"/>
    <text x="160" y="496" text-anchor="middle" class="lbl t-teal">Canonical Report</text>
    <text x="280" y="496" class="sub note">single source of truth (JSON)</text>

    <line x1="160" y1="518" x2="160" y2="534" class="arr" marker-end="url(#arr)"/>

    <!-- Gate -->
    <rect x="60" y="536" width="200" height="44" rx="8" class="box-amber"/>
    <text x="160" y="558" text-anchor="middle" class="lbl t-amber">Gate</text>
    <text x="280" y="558" class="sub note">baseline diff · CI decision</text>

    <line x1="160" y1="580" x2="160" y2="596" class="arr" marker-end="url(#arr)"/>

    <!-- Surfaces -->
    <rect x="60" y="598" width="200" height="44" rx="8" class="box-teal"/>
    <text x="160" y="620" text-anchor="middle" class="lbl t-teal">Surfaces</text>
    <text x="280" y="620" class="sub note">CLI · HTML · IDE · MCP · CI</text>

    <!-- Baseline -->

    <rect x="490" y="530" width="200" height="56" rx="8" class="box-gray"/>
    <text x="590" y="552" text-anchor="middle" class="lbl t-gray">Baseline</text>
    <text x="590" y="570" text-anchor="middle" class="sub note">trusted reference state</text>
    <line x1="490" y1="578" x2="260" y2="578" class="arr" marker-end="url(#arr)"/>

</svg>
