name: docs
run-name: docs • ${{ github.event_name }} • ${{ github.ref_name }}

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"
          allow-prereleases: true

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --dev

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build docs site
        run: uv run --with mkdocs --with mkdocs-material mkdocs build --strict

      - name: Generate sample report artifacts
        run: uv run python scripts/build_docs_example_report.py --output-dir site/examples/report/live

      - name: Upload docs artifact
        if: ${{ github.event_name != 'push' || github.ref != 'refs/heads/main' }}
        uses: actions/upload-artifact@v7
        with:
          name: codeclone-docs-site
          path: site
          if-no-files-found: error

      - name: Upload GitHub Pages artifact
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
