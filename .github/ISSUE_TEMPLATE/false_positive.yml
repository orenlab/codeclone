name: ⚠️ False positive
description: CodeClone detected a clone that should not be considered duplication
title: "[False Positive]: "
labels: [ "false-positive" ]
assignees: [ ]

body:
  - type: markdown
    attributes:
      value: |
        CodeClone aims to be conservative.
        This report helps us tune normalization and CFG semantics.

  - type: input
    id: version
    attributes:
      label: CodeClone version
      placeholder: "2.0.0"
    validations:
      required: true

  - type: dropdown
    id: family
    attributes:
      label: Detection family
      options:
        - Function clone
        - Block clone
        - Segment clone (report-only)
        - Structural finding
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal reproduction
      description: Paste both snippets, the reduced example, or the relevant finding evidence
      render: python
    validations:
      required: true

  - type: textarea
    id: reasoning
    attributes:
      label: Why these should NOT be considered clones?
      description: |
        Explain semantic or architectural differences
        (e.g. different responsibilities, contracts, side effects).
    validations:
      required: true

  - type: checkboxes
    id: cfg_related
    attributes:
      label: Additional signals
      options:
        - label: Control flow structure differs meaningfully
        - label: Side effects or runtime behavior differ meaningfully
        - label: The issue appears only in tests / fixtures
