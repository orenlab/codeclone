name: CodeClone
description: >
  Structural code health analysis for Python with baseline-aware CI gating,
  SARIF upload, and PR-friendly summaries.

author: OrenLab

branding:
  icon: copy
  color: blue

inputs:
  python-version:
    description: "Python version"
    required: false
    default: "3.13"

  package-version:
    description: "CodeClone version from PyPI (empty = latest stable)"
    required: false
    default: ""

  path:
    description: "Project root"
    required: false
    default: "."

  json-path:
    description: "Canonical JSON report output path"
    required: false
    default: ".cache/codeclone/report.json"

  sarif:
    description: "Generate SARIF and upload to Code Scanning"
    required: false
    default: "true"

  sarif-path:
    description: "SARIF output path"
    required: false
    default: ".cache/codeclone/report.sarif"

  pr-comment:
    description: "Post or update a PR summary comment"
    required: false
    default: "true"

  fail-on-new:
    description: "Fail if new clone groups are detected"
    required: false
    default: "true"

  fail-on-new-metrics:
    description: "Fail if metrics regress vs baseline"
    required: false
    default: "false"

  fail-threshold:
    description: "Max allowed function+block clone groups (-1 = disabled)"
    required: false
    default: "-1"

  fail-complexity:
    description: "Max cyclomatic complexity (-1 = disabled)"
    required: false
    default: "-1"

  fail-coupling:
    description: "Max coupling CBO (-1 = disabled)"
    required: false
    default: "-1"

  fail-cohesion:
    description: "Max cohesion LCOM4 (-1 = disabled)"
    required: false
    default: "-1"

  fail-cycles:
    description: "Fail if dependency cycles are detected"
    required: false
    default: "false"

  fail-dead-code:
    description: "Fail if high-confidence dead code is detected"
    required: false
    default: "false"

  fail-health:
    description: "Minimum health score (-1 = disabled)"
    required: false
    default: "-1"

  require-baseline:
    description: "Fail if the baseline file is missing"
    required: false
    default: "true"

  baseline-path:
    description: "Baseline path passed to CodeClone"
    required: false
    default: "codeclone.baseline.json"

  metrics-baseline-path:
    description: "Metrics baseline path passed to CodeClone"
    required: false
    default: "codeclone.baseline.json"

  extra-args:
    description: "Additional CodeClone CLI arguments"
    required: false
    default: ""

  no-progress:
    description: "Disable progress output"
    required: false
    default: "true"

outputs:
  exit-code:
    description: "CodeClone process exit code"
    value: ${{ steps.analysis.outputs.exit-code }}
  json-path:
    description: "Resolved JSON report path"
    value: ${{ steps.analysis.outputs.json-path }}
  sarif-path:
    description: "Resolved SARIF report path"
    value: ${{ steps.analysis.outputs.sarif-path }}
  pr-comment-id:
    description: "Updated PR comment id when a PR comment was posted"
    value: ${{ steps.post-pr-comment.outputs.comment-id }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install CodeClone
      shell: bash
      env:
        CODECLONE_VERSION: ${{ inputs.package-version }}
      run: |
        python -m pip install --upgrade pip
        if [ -n "${CODECLONE_VERSION}" ]; then
          python -m pip install "codeclone==${CODECLONE_VERSION}"
        else
          python -m pip install codeclone
        fi

    - name: Verify baseline
      if: ${{ inputs.require-baseline == 'true' }}
      shell: bash
      env:
        INPUT_PROJECT_PATH: ${{ inputs.path }}
        INPUT_BASELINE_PATH: ${{ inputs.baseline-path }}
      run: |
        python - <<'PY'
        import os
        import sys
        from pathlib import Path

        project_root = Path(os.environ["INPUT_PROJECT_PATH"])
        baseline_path = Path(os.environ["INPUT_BASELINE_PATH"])
        target = baseline_path if baseline_path.is_absolute() else project_root / baseline_path
        if not target.exists():
            print(f"Missing required CodeClone baseline: {target}", file=sys.stderr)
            raise SystemExit(1)
        PY

    - name: Run CodeClone
      id: analysis
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        INPUT_JSON_PATH: ${{ inputs.json-path }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_SARIF_PATH: ${{ inputs.sarif-path }}
        INPUT_FAIL_ON_NEW: ${{ inputs.fail-on-new }}
        INPUT_FAIL_ON_NEW_METRICS: ${{ inputs.fail-on-new-metrics }}
        INPUT_FAIL_THRESHOLD: ${{ inputs.fail-threshold }}
        INPUT_FAIL_COMPLEXITY: ${{ inputs.fail-complexity }}
        INPUT_FAIL_COUPLING: ${{ inputs.fail-coupling }}
        INPUT_FAIL_COHESION: ${{ inputs.fail-cohesion }}
        INPUT_FAIL_CYCLES: ${{ inputs.fail-cycles }}
        INPUT_FAIL_DEAD_CODE: ${{ inputs.fail-dead-code }}
        INPUT_FAIL_HEALTH: ${{ inputs.fail-health }}
        INPUT_BASELINE_PATH: ${{ inputs.baseline-path }}
        INPUT_METRICS_BASELINE_PATH: ${{ inputs.metrics-baseline-path }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
        INPUT_NO_PROGRESS: ${{ inputs.no-progress }}
      run: |
        python "${{ github.action_path }}/run_codeclone.py"

    - name: Render PR summary
      id: render-pr-comment
      if: ${{ inputs.pr-comment == 'true' && github.event_name == 'pull_request' && steps.analysis.outputs.json-exists == 'true' }}
      shell: bash
      env:
        REPORT_PATH: ${{ steps.analysis.outputs.json-path }}
        ANALYSIS_EXIT_CODE: ${{ steps.analysis.outputs.exit-code }}
        COMMENT_OUTPUT_PATH: ${{ runner.temp }}/codeclone-pr-comment.md
      run: |
        python "${{ github.action_path }}/render_pr_comment.py"

    - name: Upload SARIF
      if: ${{ always() && inputs.sarif == 'true' && steps.analysis.outputs.sarif-exists == 'true' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.analysis.outputs.sarif-path }}
        category: codeclone

    - name: Post or update PR comment
      id: post-pr-comment
      if: ${{ always() && inputs.pr-comment == 'true' && github.event_name == 'pull_request' && steps.render-pr-comment.outputs.comment-exists == 'true' }}
      continue-on-error: true
      uses: actions/github-script@v7
      env:
        COMMENT_BODY_PATH: ${{ steps.render-pr-comment.outputs.comment-body-path }}
        COMMENT_MARKER: "<!-- codeclone-report -->"
      with:
        script: |
          const fs = require("fs");
          const body = fs.readFileSync(process.env.COMMENT_BODY_PATH, "utf8");
          const marker = process.env.COMMENT_MARKER;
          const issue_number = context.issue.number;
          const { owner, repo } = context.repo;

          const comments = await github.paginate(
            github.rest.issues.listComments,
            {
              owner,
              repo,
              issue_number,
              per_page: 100,
            },
          );

          const existing = comments.find(
            (comment) =>
              comment.user &&
              comment.user.type === "Bot" &&
              comment.body &&
              comment.body.includes(marker),
          );

          let result;
          if (existing) {
            result = await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            result = await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }

          core.setOutput("comment-id", String(result.data.id));

    - name: Gate result
      if: ${{ always() }}
      shell: bash
      run: |
        exit "${{ steps.analysis.outputs.exit-code }}"
