# Zensical configuration for CodeClone docs site.
# Docs: https://zensical.org/docs/

[project]
site_name = "CodeClone"
site_description = "Structural review layer for Python"
site_url = "https://orenlab.github.io/codeclone/"
repo_url = "https://github.com/orenlab/codeclone"
repo_name = "orenlab/codeclone"

docs_dir = "docs"
edit_uri = "blob/main/docs/"

exclude_docs = ["README-pypi.md"]

extra_css = ["assets/stylesheets/extra.css"]

nav = [
    { "Home" = "index.md" },
    { "Get started" = [
        { "Getting Started" = "getting-started.md" },
        { "Example report" = "examples/report.md" },
    ] },
    { "Guides" = [
        { "How CodeClone works" = "architecture.md" },
        { "MCP for AI agents" = "mcp.md" },
        { "Integrations" = [
            { "VS Code" = "vscode-extension.md" },
            { "Cursor" = "cursor-plugin.md" },
            { "Codex" = "codex-plugin.md" },
            { "Claude Desktop" = "claude-desktop-bundle.md" },
            { "SARIF & code scanning" = "sarif.md" },
        ] },
    ] },
    { "Reference" = [
        { "Overview" = "book/README.md" },
        { "Foundations" = [
            { "Intro" = "book/00-intro.md" },
            { "Terminology" = "book/01-terminology.md" },
            { "Architecture Map" = "book/02-architecture-map.md" },
        ] },
        { "Pipeline & data" = [
            { "Core Pipeline" = "book/03-core-pipeline.md" },
            { "CFG Semantics" = "book/04-cfg-semantics.md" },
            { "Report" = "book/05-report.md" },
            { "HTML Render" = "book/06-html-render.md" },
            { "Baseline" = "book/07-baseline.md" },
            { "Cache" = "book/08-cache.md" },
        ] },
        { "Contracts & config" = [
            { "Exit Codes" = "book/09-exit-codes.md" },
            { "Config and Defaults" = "book/10-config-and-defaults.md" },
            { "CLI" = "book/11-cli.md" },
        ] },
        { "Change control" = [
            { "Structural Change Controller" = "book/12-structural-change-controller.md" },
            { "Engineering Memory" = "book/13-engineering-memory.md" },
            { "Claim Guard" = "book/14-claim-guard.md" },
        ] },
        { "Quality signals" = [
            { "Health Score" = "book/15-health-score.md" },
            { "Metrics and Gates" = "book/16-metrics-and-quality-gates.md" },
            { "Dead Code" = "book/17-dead-code-contract.md" },
            { "Suggestions and Clone Typing" = "book/18-suggestions-and-clone-typing.md" },
            { "Inline Suppressions" = "book/19-inline-suppressions.md" },
            { "Benchmarking" = "book/20-benchmarking.md" },
        ] },
        { "System properties" = [
            { "Security Model" = "book/21-security-model.md" },
            { "Determinism" = "book/22-determinism.md" },
            { "Testing as Spec" = "book/23-testing-as-spec.md" },
            { "Compatibility and Versioning" = "book/24-compatibility-and-versioning.md" },
        ] },
        { "MCP interface" = [
            { "MCP Interface Contract" = "book/25-mcp-interface.md" },
        ] },
        { "Appendix" = [
            { "Status Enums" = "book/appendix/a-status-enums.md" },
            { "Schema Layouts" = "book/appendix/b-schema-layouts.md" },
            { "Error Catalog" = "book/appendix/c-error-catalog.md" },
        ] },
    ] },
    { "Legal & plans" = [
        { "Privacy Policy" = "privacy-policy.md" },
        { "Terms of Use" = "terms-of-use.md" },
        { "Plans and Retention" = "plans-and-retention.md" },
    ] },
    { "Maintainers" = [
        { "Publishing the docs site" = "publishing.md" },
        { "Releasing & storefront sync" = "releasing.md" },
    ] },
]

[project.theme]
logo = "assets/codeclone-docs-wordmark.svg"
favicon = "assets/favicon.svg"

features = [
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "navigation.instant",
    "navigation.tracking",
    "search.highlight",
    "content.code.copy",
    "content.tabs.link",
]

[project.theme.icon]
repo = "fontawesome/brands/github"

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[[project.theme.palette]]
scheme = "default"
primary = "white"
accent = "indigo"
toggle.icon = "material/weather-night"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "black"
accent = "indigo"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to light mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
